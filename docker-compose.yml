version: '3.8'

services:
  # ── Backend API Server ──────────────────────────────────────────────────
  backend:
    build:
      context: ./multi-agent-creative-studio
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - LOG_LEVEL=info
      - PERSISTENCE_MODE=memory
      - GENAI_PROVIDER=${GENAI_PROVIDER:-google}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL:-}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY:-}
      - CORS_ORIGIN=http://localhost:5173,http://localhost:5175
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=creative_studio
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./multi-agent-creative-studio:/app
      - /app/node_modules
      - /app/dist
    command: npm run dev
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - byte-defenders-network

  # ── Frontend App ────────────────────────────────────────────────────────
  frontend:
    image: node:18-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:3000/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    networks:
      - byte-defenders-network

  # ── Redis (Caching) ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - byte-defenders-network

  # ── PostgreSQL (Persistent Storage) ─────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=creative_studio
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./multi-agent-creative-studio/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - byte-defenders-network

volumes:
  redis_data:
  postgres_data:

networks:
  byte-defenders-network:
    driver: bridge
