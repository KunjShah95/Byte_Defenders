version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=info
      - PORT=3000
      - GENAI_API_KEY=${GENAI_API_KEY}
      - GENAI_BASE_URL=${GENAI_BASE_URL:-https://api.openai.com/v1}
      - GENAI_MODEL=${GENAI_MODEL:-gpt-4}
      - MOTI_ENABLED=${MOTI_ENABLED:-false}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    command: npm run dev

  # Optional: Redis for caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Optional: PostgreSQL for persistent storage
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=creative_studio
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
